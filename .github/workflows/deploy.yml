name: Verify wiki site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required static files exist
        run: |
          test -f index.html
          test -d pages
          test -d assets
          test -f .nojekyll

      - name: Report success
        run: echo "Static wiki site files are present and ready for GitHub Pages deployment."
