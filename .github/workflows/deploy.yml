name: Deploy wiki site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild static site
        run: python build_wiki_site.py

      - name: Commit generated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html pages assets README.md .nojekyll build_wiki_site.py
          if ! git diff --cached --quiet; then
            git commit -m "Rebuild wiki site"
            git push
          fi
